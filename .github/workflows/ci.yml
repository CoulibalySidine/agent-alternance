name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        env:
          ANTHROPIC_API_KEY: "sk-ant-fake-key-for-testing"
        run: |
          pytest tests/ -v --tb=short

      - name: Check imports
        run: |
          python -c "from api.main import app; print('✅ API imports OK')"
          python -c "from sourcing.models import Offre; print('✅ Models imports OK')"
          python -c "from suivi.tracker import Candidature; print('✅ Tracker imports OK')"
